[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps=false"

# The Next.js runtime is auto-installed; no plugin block needed.
# It handles App Router, ISR (revalidate=60), server actions,
# and next/image (served via Netlify Image CDN).

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
